# Nginx site config for Crub Bucks on Ionos VPS.
#
# Install to:  /etc/nginx/sites-available/crubbucks
# Enable with: ln -s /etc/nginx/sites-available/crubbucks /etc/nginx/sites-enabled/
# Test with:   nginx -t
# Reload with: systemctl reload nginx
#
# Replace YOURDOMAIN.COM with your actual domain everywhere it appears, then:
#   certbot --nginx -d yourdomain.com
# Certbot will rewrite the listen 443 block to add the TLS cert paths.

# ── Rate-limit zones (defined in http{} via this include) ────────────────────
limit_req_zone $binary_remote_addr zone=login:10m    rate=10r/m;
limit_req_zone $binary_remote_addr zone=register:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=app:10m      rate=120r/m;

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name YOURDOMAIN.COM;

    # ACME challenge passthrough (certbot --nginx wires this up automatically
    # too, but keeping it here lets renewals work via webroot mode as a fallback).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    # listen-line http2 is the legacy syntax — works on both Nginx 1.24
    # (Ubuntu 24.04's package) and 1.25+ (where `http2 on;` is preferred
    # but the legacy form still parses with a deprecation warning).
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name YOURDOMAIN.COM;

    # ── TLS (managed by Certbot) ─────────────────────────────────────────────
    # certbot --nginx fills in these paths and the include lines after the
    # first run. Listed here as documentation.
    # ssl_certificate     /etc/letsencrypt/live/YOURDOMAIN.COM/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOURDOMAIN.COM/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────────────────
    # HSTS only after you're confident HTTPS is permanent — once browsers
    # cache the policy, plain-HTTP fallbacks are blocked for the duration.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"      always;

    # ── Request size limit ───────────────────────────────────────────────────
    # Crub Bucks doesn't accept uploads. 1 MB is generous headroom for form
    # payloads (notification body, bet title, etc).
    client_max_body_size 1m;

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/crubbucks.access.log;
    error_log  /var/log/nginx/crubbucks.error.log;

    # ── Static assets served directly by Nginx ───────────────────────────────
    # adapter-node writes hashed client bundles to ./build/client/_app/
    # Long-immutable cache is safe because filenames include a content hash.
    location /_app/ {
        root /home/crubbucks/app/build/client;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Mascot artwork and the Crub-Buck bill live in /static at build time
    # and end up in build/client/ at the root. Cache them aggressively.
    location ~* ^/(cala-.+\.png|crub-buck\.jpg|kibble-text\.svg)$ {
        root /home/crubbucks/app/build/client;
        expires 30d;
        add_header Cache-Control "public, must-revalidate";
        access_log off;
    }

    # ── Auth endpoints: tighter rate limit ───────────────────────────────────
    location = /login {
        limit_req zone=login    burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
    }

    location = /register {
        limit_req zone=register burst=2 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
    }

    # ── Health probe: no rate limit, no logging ──────────────────────────────
    location = /health {
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
        access_log off;
    }

    # ── SvelteKit Node server (catch-all) ────────────────────────────────────
    location / {
        limit_req zone=app burst=40 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
    }

    # ── Block common attack paths ────────────────────────────────────────────
    # 404 (not 403) so scanners don't learn the site is live. All three
    # terminate at Nginx so nothing reaches SvelteKit — keeps app logs clean.

    # Dotfiles: /.env, /.git/*, /.ssh/*, /.htaccess, ...
    location ~ /\. {
        access_log off;
        log_not_found off;
        return 404;
    }

    # WordPress / phpMyAdmin / actuator credential-scanner targets.
    location ~* ^/(wp-admin|wp-login\.php|wp-includes|xmlrpc\.php|phpmyadmin|adminer|config\.php|server-status|server-info|actuator)(/|$) {
        access_log off;
        log_not_found off;
        return 404;
    }

    # File extensions that should never be served from this app.
    location ~* \.(sh|sql|bak|cfg|log|ini|yml|yaml|swp|orig|pem|key|crt|old)$ {
        access_log off;
        log_not_found off;
        return 404;
    }
}
