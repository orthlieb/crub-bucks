name: E2E

# Playwright end-to-end smoke tests. Runs on PRs and pushes to main, against a
# freshly-migrated and seeded throwaway Postgres. Kept separate from the deploy
# workflow so a browser-test hiccup never blocks a production deploy (deploy.yml
# already gates on the unit + db suites and the coverage floor).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: crub
          POSTGRES_PASSWORD: crub
          POSTGRES_DB: crubbucks_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      # Migrate + seed + run all target the throwaway test DB. The Playwright
      # webServer (npm run dev) inherits this env, so the app talks to it too.
      DATABASE_URL: postgres://crub:crub@localhost:5432/crubbucks_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Migrate test database
        run: npm run db:migrate

      - name: Seed test database
        run: npm run db:seed

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
