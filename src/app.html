<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />

		<!-- Favicons. SVG for modern browsers; PNG fallbacks for the rest. -->
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		<link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
		<link rel="icon" href="/favicon-16.png" sizes="16x16" type="image/png" />

		<!-- iOS home-screen icon (Safari "Add to Home Screen" / save to desktop). -->
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />

		<!-- Android / PWA install metadata. -->
		<link rel="manifest" href="/site.webmanifest" />

		<!--
			Fit-to-viewport, no pinch-zoom, scrolling still allowed.
			- maximum-scale=1 + user-scalable=no disables pinch/double-tap zoom.
			- viewport-fit=cover lets content + theme colour extend under the
			  iPhone notch / home-indicator safe areas.
		-->
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
		/>

		<!-- Address-bar / status-bar tint. Violet in light mode, near-black in dark. -->
		<meta name="theme-color" content="#7c3aed" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#1a1325" media="(prefers-color-scheme: dark)" />

		<!-- Standalone web-app behaviour when launched from the home screen. -->
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Crub Bucks" />
		<meta name="application-name" content="Crub Bucks" />
		<!-- Don't auto-link phone numbers / addresses in our ledger amounts. -->
		<meta name="format-detection" content="telephone=no" />

		<meta name="description" content="Crub Bucks — a closed-loop play currency for settling bets, chores, and IOUs among friends." />
		<meta property="og:title" content="Crub Bucks" />
		<meta property="og:description" content="A closed-loop play currency for bets, chores, and IOUs. Zero-sum by design; the bank is bottomless." />
		<meta property="og:image" content="/crub-buck.jpg" />
		<meta property="og:type" content="website" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:image" content="/crub-buck.jpg" />
		<script>
			// Apply the saved (or system) theme before paint to avoid a flash.
			// theme = 'light' | 'dark' | 'system' (absent ⇒ system).
			try {
				const apply = () => {
					const t = localStorage.getItem('theme');
					const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
					const dark = t === 'dark' || ((t === 'system' || !t) && systemDark);
					document.documentElement.classList.toggle('dark', dark);
				};
				apply();
				// Live-update when the OS flips light/dark mid-session — but only
				// when the user is in "follow system" mode (no explicit override
				// saved). If they've toggled to a specific theme elsewhere in the
				// app, that choice wins.
				window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
					const t = localStorage.getItem('theme');
					if (t === 'system' || !t) apply();
				});
			} catch (e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
